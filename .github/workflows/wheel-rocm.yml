# Builds the nixl_rocm backend wheel on tagged releases and uploads it as a
# release asset. Built end-to-end from contrib/Dockerfile (rocm-build stage)
# via contrib/build-container.sh --rocm, so the wheel matches what users
# get from the published container.

name: wheel-rocm

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to build'
        required: false
        type: string

jobs:
  build-wheel:
    name: Build nixl_rocm wheel
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}
          fetch-depth: 0

      - name: Build ROCm container
        run: ./contrib/build-container.sh --rocm --tag nixl-rocm:wheel --no-cache

      - name: Extract wheels
        run: |
          mkdir -p dist
          id=$(docker create nixl-rocm:wheel)
          docker cp "$id":/workspace/nixl/dist/. dist/
          docker rm "$id"
          ls -la dist/

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nixl-rocm-wheels
          path: dist/*.whl
          if-no-files-found: error

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.whl
