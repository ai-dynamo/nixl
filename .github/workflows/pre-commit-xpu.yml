name: Run Pre-Commit Hooks XPU

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-xpu-dockerfile:
    name: Build .ci/dockerfiles/Dockerfile.xpu
    runs-on: xpu-build
    timeout-minutes: 120

    env:
      IMAGE_TAG: nixl-xpu:sha-${{ github.sha }}

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image from Dockerfile.xpu
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .ci/dockerfiles/Dockerfile.xpu
          load: true
          push: false
          tags: ${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max