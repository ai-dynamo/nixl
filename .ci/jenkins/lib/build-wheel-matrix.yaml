# Build Matrix Configuration for NIXL CI Pipeline
#
# This file defines the build matrix configuration for the NIXL CI pipeline in Jenkins.
# It specifies the build environment, resources, and test matrix for continuous integration.
#
# =============================================================================
# Multi-Stage Docker Build Integration
# =============================================================================
# This CI pipeline uses contrib/build-container.sh with contrib/Dockerfile.manylinux
# to build wheels for specific Python versions and architectures in each matrix
# combination. The script handles the multi-stage Docker build internally, using
# the CUDA manylinux base image from Artifactory as the build environment.
#
# CI Usage: build-container.sh --base-image ... --wheel-base ... (builds and packages wheels)
# User Usage: Full image build via build-container.sh (same script, different invocation)
#
# =============================================================================
# Key Components:
# =============================================================================
# - Job Configuration: Defines timeout, failure behavior, and Kubernetes resources
# - Docker Images: Specifies the container images used for different build stages
#   - Uses contrib/Dockerfile.manylinux via contrib/build-container.sh
#   - Base image: artifactory.nvidia.com/sw-nbu-swx-nixl-docker-local/base/cuda:13.0-devel-manylinux--25.09
# - Matrix Axes: Defines build variations (Python versions and architectures)
# - Build Steps: Sequential steps for building, testing, and wheel generation
#
# =============================================================================
# When Modified:
# =============================================================================
# - Adding/removing Docker images: Affects available build environments
# - Modifying matrix axes: Changes build variations (e.g., adding architectures)
# - Adjusting resource limits: Impacts build performance and resource allocation
# - Adding/removing steps: Changes the build pipeline sequence
# - Changing build-container.sh args: Affects Docker build behavior and base image selection
#
# Note: Changes to this file are tested as part of the PR CI flow no need to test them manually.

---
# =============================================================================
# Job Configuration
# =============================================================================
job: nixl-ci-build-wheel

# Fail job if one of the steps fails or continue
# Set to false to allow matrix builds to continue even if some combinations fail
failFast: false

# Build timeout - 4 hours for complex multi-architecture builds
timeout_minutes: 240

# =============================================================================
# Container Registry Configuration
# =============================================================================
# Artifactory registry for storing build artifacts and base images
registry_host: artifactory.nvidia.com
registry_auth: svc-nixl-new-artifactory-token
registry_path: /sw-nbu-swx-nixl-docker-local/ci

credentials:
  - credentialsId: 'svc-nixl-new-artifactory-token'
    usernameVariable: 'ARTIFACTORY_USER'
    passwordVariable: 'ARTIFACTORY_TOKEN'
  # Deploy token for the sw-dynamo-nixl-pypi-local repo (the release-wheel publish target).
  # TODO(ops): create/point this at a secret-text credential with deploy rights there
  # (the base-image svc token above may not have write access to sw-dynamo-*).
  - credentialsId: 'svc-nixl-artifactory-pypi-token'
    variable: 'ARTIFACTORY_PYPI_TOKEN'

# =============================================================================
# Kubernetes Resource Configuration
# =============================================================================
# High-performance build environment with substantial resources for complex builds
kubernetes:
  cloud: il-ipp-blossom-prod
  namespace: nbu-swx-nixl
  imagePullSecrets: "['artifactory-pull-secret']"
  # 24GB memory and 16 CPU cores for parallel compilation and large builds
  limits: '{memory: 24Gi, cpu: 16000m}'
  requests: '{memory: 24Gi, cpu: 16000m}'

# =============================================================================
# Docker Build Configuration
# =============================================================================
# Uses podman-in-container (quay.io/podman/stable) as the build runner
# build-container.sh runs podman/docker inside this container to build the wheel image
runs_on_dockers:
  - { name: "manylinux", url: "quay.io/podman/stable:v5.7.1", privileged: true }

# =============================================================================
# Build Matrix Configuration
# =============================================================================
# Defines the combinations of manylinux version and Python versions and architectures to build
# Each combination runs in parallel
matrix:
  axes:
    manylinux:
      - "2_28"
    # CUDA toolkit versions to build the full release wheel set for. All Python versions
    # (WHL_PYTHON_VERSIONS below) are built in a single image per (cuda, arch), so Python
    # is NOT a matrix axis. cu13 uses the existing Artifactory manylinux base; cu12 needs a
    # matching cu12 base image — enable it once BASE_TAG_CU12 is published to Artifactory.
    cuda:
      - "13.0"
      # - "12.9"   # TODO(ops): enable once a cu12 manylinux base exists (see BASE_TAG_CU12)
    # Target architectures for wheel distribution
    # x86_64: Intel/AMD 64-bit processors
    # aarch64: ARM 64-bit processors (Apple Silicon, ARM servers)
    arch:
      - x86_64
      - aarch64

# =============================================================================
# Environment and Build Steps
# =============================================================================
# Global environment variables for the build process
env:
  NPROC: 16
  GRPC_NPROC: 10
  BASE_IMAGE: "${registry_host}/sw-nbu-swx-nixl-docker-local/base/cuda"
  # Per-CUDA manylinux base tags (same repo, different tag). cu13 exists today.
  BASE_TAG_CU13: '13.0-devel-manylinux--25.09'
  BASE_TAG_CU12: '12.9-devel-manylinux--25.09'   # TODO(ops): publish this cu12 base to Artifactory
  # All Python versions built in one image per (cuda, arch); build-container.sh passes the
  # comma list to Dockerfile.manylinux, which loops over them.
  WHL_PYTHON_VERSIONS: "3.10,3.11,3.12,3.13,3.14"
  # Release-wheel publish target (handed off to the release pipeline / nspect-register).
  ARTIFACTORY_URL: "https://${registry_host}/artifactory"
  PYPI_REPO: "sw-dynamo-nixl-pypi-local"
  # INFINIA libs image. Empty => build --no-infinia (blossom can't reach the ECR default).
  # To bundle INFINIA: mirror harbor.mellanox.com/nixl/infinia-libs into an
  # artifactory.nvidia.com repo the svc token can pull, set it here, and it is passed to
  # build-container.sh --infinia-libs-image (which drops --no-infinia). TODO(ops): mirror + set.
  INFINIA_LIBS_IMAGE: ""

steps:
  # =============================================================================
  # Step 1: Environment Preparation
  # =============================================================================
  # Set up podman environment
  # This step runs sequentially (not in parallel) to avoid conflicts
  - name: Prepare
    credentialsId: 'svc-nixl-new-artifactory-token'
    parallel: false
    run: |
      # Setup podman and dependencies
      rm -f /etc/containers/storage.conf /usr/share/containers/storage.conf
      podman system reset -f || true
      ln -sfT $(type -p podman) /usr/bin/docker
      # Login to Artifactory
      echo "$ARTIFACTORY_TOKEN" | docker login "https://${registry_host}" -u "$ARTIFACTORY_USER" --password-stdin

  # =============================================================================
  # Step 2: Python Wheel Generation
  # =============================================================================
  # Create distributable Python wheels that bundle native libraries
  # This step uses the build-wheel.sh script to package everything into wheels
  - name: Build Wheel
    parallel: false
    run: |
      set -x
      export NPROC=$NPROC
      export GRPC_NPROC=$GRPC_NPROC
      # Select the manylinux base tag for this CUDA version. --cuda-version drives the
      # cuXXX torch index and the cu12/cu13 meta-wheel split in Dockerfile.manylinux.
      if [ "${cuda}" = "12.9" ]; then BASE_TAG="${BASE_TAG_CU12}"; else BASE_TAG="${BASE_TAG_CU13}"; fi
      # INFINIA: bundle from a mirror if INFINIA_LIBS_IMAGE is set, else --no-infinia
      # (blossom can't reach the private ECR default that Dockerfile.manylinux ships).
      if [ -n "${INFINIA_LIBS_IMAGE}" ]; then
        INFINIA_ARGS="--infinia-libs-image ${INFINIA_LIBS_IMAGE}"
      else
        INFINIA_ARGS="--no-infinia"
      fi
      ./contrib/build-container.sh \
        --base-image "${BASE_IMAGE}" \
        --base-image-tag "${BASE_TAG}" \
        --cuda-version "${cuda}" \
        --wheel-base "manylinux_${manylinux}" \
        --python-versions "${WHL_PYTHON_VERSIONS}" \
        --arch ${arch} \
        ${INFINIA_ARGS} \
        --tag "nixl-wheel:cu${cuda}-${arch}" \
        --dockerfile contrib/Dockerfile.manylinux

  # =============================================================================
  # Step 3: Publish wheels to Artifactory (release staging)
  # =============================================================================
  # Extract the wheels the build produced and upload them to the release staging path,
  # so the separate release pipeline (nSpect register + scan, ship-to-prod) can grab
  # them from Artifactory. Both cuda variants for an arch land in the same <arch>/ folder.
  - name: Publish Wheels
    parallel: false
    run: |
      set -euo pipefail
      IMG="nixl-wheel:cu${cuda}-${arch}"
      # Dockerfile.manylinux writes wheels to /workspace/nixl/dist inside the image.
      cid=$(podman create "$IMG")
      rm -rf dist dist_tmp && mkdir -p dist
      podman cp "$cid:/workspace/nixl/dist" ./dist_tmp
      podman rm "$cid" >/dev/null
      find ./dist_tmp -name '*.whl' -exec mv -t dist {} +
      ls -1 dist/*.whl
      VER=$(basename "$(ls dist/nixl*.whl | head -n1)" | cut -d- -f2)
      # release/<version>/<jenkins_build>/<arch>/ — matches the layout nspect-register reads.
      DEST="${ARTIFACTORY_URL}/${PYPI_REPO}/release/${VER}/${BUILD_NUMBER}/${arch}/"
      for whl in dist/*.whl; do
        curl -fsS -H "Authorization: Bearer ${ARTIFACTORY_PYPI_TOKEN}" \
          -T "$whl" "${DEST}$(basename "$whl")" >/dev/null
        echo "uploaded $(basename "$whl")"
      done
      echo "== wheels published to ${DEST} (build ${BUILD_NUMBER}) =="

# =============================================================================
# Task Naming Convention
# =============================================================================
# Unique identifier for each matrix combination
taskName: '${name}_${manylinux}/cu${cuda}/${arch}'
