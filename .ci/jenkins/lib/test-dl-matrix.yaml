---
#
# Lyris GPU Test Matrix Configuration
#
# Key Components:
# - Job Configuration: Defines timeout, failure behavior, and server resources
# - Docker Images: Specifies the container images used for different build stages
# - Matrix Axes: Defines build variations for Lyris testing (multi-node, multi-GPU)
# - Run Steps: Sequential steps - build image, then trigger Lyris pipeline and wait
#
# When Modified:
# - Adding/removing Docker images: Affects available test environments
# - Modifying matrix axes: Changes test variations (e.g., adding architectures)
# - Adjusting resource limits: Impacts test performance and resource allocation
# - Adding/removing steps: Changes the test pipeline sequence
#
# Note: Changes to this file are tested as part of the PR CI flow no need to test them manually.


job: nixl-ci-dl-gpu

# Fail job if one of the steps fails or continue
failFast: false

timeout_minutes: 240

registry_host: artifactory.nvidia.com
registry_auth: svc-nixl-new-artifactory-token
registry_path: /sw-nbu-swx-nixl-docker-local/ci

kubernetes:
  cloud: il-ipp-blossom-prod
  namespace: nbu-swx-nixl
  imagePullSecrets: "['artifactory-pull-secret']"
  limits: "{memory: 16Gi, cpu: 16000m}"
  requests: "{memory: 8Gi, cpu: 8000m}"
  privileged: true

credentials:
  - {credentialsId: 'svc-nixl-new-artifactory-token', usernameVariable: 'REPO_USER', passwordVariable: 'REPO_PASS'}
  - {credentialsId: 'lyris-trigger-token', type: string, variable: 'LYRIS_TRIGGER_TOKEN'}
  - {credentialsId: 'lyris-api-token', type: string, variable: 'LYRIS_API_TOKEN'}

env:
  ARTIFACTORY_PATH: /sw-nbu-swx-nixl-docker-local/ci
  NIXL_INSTALL_DIR: /opt/nixl
  NIXL_BUILD_DIR: nixl_build
  TEST_TIMEOUT: 120
  STORAGE_DRIVER: overlay
  CI_IMAGE_TAG: "20260707-1"
  LYRIS_PARTITION: gb200
  # TODO: flip to main once precluster-poc lyris-exec is merged
  LYRIS_PIPELINE_REF: feat/nixl-srun-gb200-gb300

empty_volumes:
  - {mountPath: /var/lib/containers/storage, memory: false}

pvc_volumes:
  - {claimName: nbu-swx-nixl-pvc, mountPath: /mnt/pvc, readOnly: false}

# Docker images for DL testing
runs_on_dockers:
  - {
     file: '.ci/dockerfiles/Dockerfile.base',
     name: 'nixl-ci-dl-gpu-base-pytorch26.06-cuda13.3-ubuntu24.04',
     tag: "${CI_IMAGE_TAG}",
     arch: "aarch64",
     build_args: '--build-arg NIXL_INSTALL_DIR=${NIXL_INSTALL_DIR} --build-arg BASE_IMAGE=nvcr.io/nvidia/pytorch:26.06-py3 --build-arg PRE_INSTALLED_UCX_ENV=true --build-arg PRE_INSTALLED_NIXL_ENV=true --build-arg ARCH=${arch} --pull --no-cache'
    }

  - {
     file: '.ci/dockerfiles/Dockerfile.build_helper',
     name: 'build_helper_dl',
     arch: "aarch64",
     tag: "${CI_IMAGE_TAG}",
     build_args: '--build-arg BASE_IMAGE=dockerhub.nvidia.com/ubuntu:24.04 --build-arg ARCH=${arch}'
    }

matrix:
  axes:
    arch:
      - aarch64
    ucx_version:
      - master
      - v1.22.x

taskName: "${name}/${arch}/ucx-${ucx_version}/${axis_index}"

steps:
  - name: Compiling NIXL Docker Image for DL
    containerSelector: "{name: 'build_helper_dl'}"
    credentialsId: "svc-nixl-new-artifactory-token"
    parallel: false
    run: |
      set -x
      export PR_IMAGE=${registry_host}${registry_path}/pr/${arch}/nixl-ci-dl-gpu-test-${ucx_version}:${BUILD_NUMBER}
      rm -rf /etc/containers/storage.conf && rm -f /usr/share/containers/storage.conf
      podman build --network host --creds ${REPO_USER}:${REPO_PASS} \
      --build-arg UCX_VERSION=${ucx_version} \
      --build-arg PRE_INSTALLED_ENV="true" \
      --build-arg NIXL_INSTALL_DIR=${NIXL_INSTALL_DIR} \
      --build-arg NIXL_BUILD_DIR=${NIXL_BUILD_DIR} \
      --build-arg HAS_GPU=true \
      --build-arg BASE_IMAGE=${registry_host}${registry_path}/${arch}/nixl-ci-dl-gpu-base-pytorch26.06-cuda13.3-ubuntu24.04:${CI_IMAGE_TAG} \
      --tag ${PR_IMAGE} \
      -f .ci/dockerfiles/Dockerfile.gpu-test .
      podman push --creds ${REPO_USER}:${REPO_PASS} ${PR_IMAGE}

  # Runs all four tests in ONE Lyris allocation and downloads per-test results
  # into ./results/. Gates on infra only (trigger_and_wait exits 90 on
  # allocation/runner failure); per-test pass/fail is gated by the stages below.
  - name: Run DL tests on Lyris
    containerSelector: "{name: 'build_helper_dl'}"
    timeout: "${TEST_TIMEOUT}"
    parallel: false
    credentialsId: ['lyris-trigger-token', 'lyris-api-token']
    run: |
      set -x
      # test-cmds: "name<TAB>command" per line; per-test env inlined as a prefix.
      printf "python\t.gitlab/test_python.sh ${NIXL_INSTALL_DIR}\n" > tc.txt
      printf "rust\t.gitlab/test_rust.sh ${NIXL_INSTALL_DIR}\n" >> tc.txt
      printf "cpp\tUCX_IB_REG_METHODS=rcache .gitlab/test_cpp.sh ${NIXL_INSTALL_DIR}\n" >> tc.txt
      printf "nixlbench\tHAS_GPU=false .gitlab/test_nixlbench.sh ${NIXL_INSTALL_DIR}\n" >> tc.txt
      TRIGGER_TOKEN=${LYRIS_TRIGGER_TOKEN} GITLAB_TOKEN=${LYRIS_API_TOKEN} \
      .ci/scripts/trigger_and_wait.sh \
        --ref ${LYRIS_PIPELINE_REF} \
        --partition ${LYRIS_PARTITION} \
        --image "${registry_host}#${ARTIFACTORY_PATH}/pr/${arch}/nixl-ci-dl-gpu-test-${ucx_version}:${BUILD_NUMBER}" \
        --test-cmds-file tc.txt \
        --retries 2

  # Per-test result stages: surface each test's pass/fail from the single run
  # above (they read ./results/<name>.rc, they do not re-run anything).
  - name: Python
    containerSelector: "{name: 'build_helper_dl'}"
    parallel: false
    run: |
      cat results/python.log 2>/dev/null || true
      exit "$(cat results/python.rc 2>/dev/null || echo 1)"

  - name: Rust
    containerSelector: "{name: 'build_helper_dl'}"
    parallel: false
    run: |
      cat results/rust.log 2>/dev/null || true
      exit "$(cat results/rust.rc 2>/dev/null || echo 1)"

  - name: CPP
    containerSelector: "{name: 'build_helper_dl'}"
    parallel: false
    run: |
      cat results/cpp.log 2>/dev/null || true
      exit "$(cat results/cpp.rc 2>/dev/null || echo 1)"

  - name: Nixlbench
    containerSelector: "{name: 'build_helper_dl'}"
    parallel: false
    run: |
      cat results/nixlbench.log 2>/dev/null || true
      exit "$(cat results/nixlbench.rc 2>/dev/null || echo 1)"
