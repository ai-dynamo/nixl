# 1M-context profile for DeepSeek-V4-Pro, pure bf16 storage.

strategy:
  tp_size: 1
  pp_size: 1
  model_quant_mode: "fp8"
  kvcache_quant_mode: "bf16"
  index_quant_mode: "bf16"

runtime:
  isl: 1048576
  osl: 0
  num_requests: 1

system:
  hardware: "H100"
  backend: "SGLANG"
  access_pattern: "layer"
  page_size: 256
