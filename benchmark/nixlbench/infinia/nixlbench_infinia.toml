# Complete nixlbench configuration for INFINIA backend
# This is the main nixlbench config file that references the INFINIA plugin config
#
# Usage from nixlbench build directory:
#   ./nixlbench --config_file ../infinia/nixlbench_infinia.toml

# Backend selection
backend = "INFINIA"

# INFINIA plugin configuration file (simple key=value format)
# Path is relative to where nixlbench is run from (typically build directory)
infinia_config_file = "../infinia/infinia_example.conf"

# Memory segment types
initiator_seg_type = "DRAM"
target_seg_type = "DRAM"

# Transfer configuration
total_buffer_size = 67108864      # 64 MB
start_block_size = 4096           # 4 KB
max_block_size = 2097152          # 2 MB
num_iter = 16
warmup_iter = 8
num_threads = 8
op_type = "WRITE"

# Runtime configuration
runtime_type = "null"
scheme = "pairwise"
num_initiator_dev = 1
num_target_dev = 1

# Example usage:
# ./nixlbench --config_file configs/nixlbench_infinia.toml

